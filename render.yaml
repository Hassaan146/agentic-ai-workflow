services:
  - type: web
    name: agentic-ai-workflow-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOW_DEV_AUTH
        value: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_REASONING_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SEARCH_PROVIDER
        value: duckduckgo
      - key: DEFAULT_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: DEFAULT_REASONING_MODEL
        value: llama-3.3-70b-versatile
